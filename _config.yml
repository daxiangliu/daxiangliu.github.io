# 欢迎使用 Jekyll！
#
# 这个配置文件用于放置影响整个站点的全局设置。
# 大多数设置只需要初始化一次，后续很少改动。
# 技术原因：运行 `jekyll serve -l -H localhost` 时，本文件不会自动热加载。
# 如果你修改了本文件，请重启本地服务。

# 基础站点设置
locale                   : "zh-CN"
site_theme               : "default" # 可选主题："default"、"air"、"sunrise"、"mint"、"dirt"、"contrast"
title                    : "Daxiang Liu"
title_separator          : "-"
name                     : &name "Daxiang Liu"
description              : &description "Daxiang Liu 的学术主页：CAD / 3D 智能、Text-to-CAD 跨模态检索与医学图像分析。"
url                      : https://daxiangliu.github.io # 站点主域名，例如 "https://[你的 GitHub 用户名].github.io"
                                                           # 如果仓库不是用户名主页仓库，可用 "https://[用户名].github.io/[仓库名]"
baseurl                  : "" # 子路径，例如 "/blog"；使用用户名主页仓库时通常留空
repository               : "daxiangliu/daxiangliu.github.io"

# 侧边栏作者信息：下面字段决定左侧个人卡片展示内容
#               字段留空时，对应图标/链接不会显示
#               如需深度自定义，可编辑 /_includes/author-profile.html
author:
  # 个人基础信息
  avatar           : "my_photo_katong.jpg"
  name             : "Daxiang Liu"
  pronouns         : # 示例："she/her"
  bio              : "硕士研究生｜CAD / 3D 智能与医学图像分析"
  location         : "深圳，中国"
  employer         : "深圳大学"
  uri              : # 个人网址
  # 我的联系邮箱
  email            : "liudaxiang.cs@foxmail.com"

  # 学术平台
  academia         : # 网址
  arxiv            : # 网址（请填你的个人页面链接）
  googlescholar    :
  inspire-hep      : # 网址
  impactstory      : # 网址
  orcid            :
  semantic         : # 网址
  ssrn             : # 网址
  pubmed           :
  researchgate     : # 网址
  scopus           : # 网址
  zotero           : # 网址


  # 代码托管与开发平台
  bitbucket        : # 用户名
  codepen          : # 用户名
  dribbble         : # 用户名
  github           : "daxiangliu"
  kaggle           : # 用户名
  stackoverflow    : # 用户编号，或“编号/用户名”（如 "1" 或 "1/jeff-atwood"）

  # 社交媒体
  artstation       : # 用户名
  bluesky          :
  facebook         : # 用户名
  flickr           : # 用户名
  foursquare       : # 用户名
  goodreads        : # 用户名
  google_plus      : # 用户名
  keybase          : # 用户名
  instagram        : # 用户名
  lastfm           : # 用户名
  linkedin         : # 用户名
  mastodon         : # 网址
  medium           : # 网址
  pinterest        : # 用户名
  soundcloud       : # 用户名
  steam            : # 用户名
  telegram         : # 网址
  tumblr           : # 用户名
  twitter          : # X / Twitter 用户名
  vine             : # 用户名
  weibo            : # 用户名
  wikipedia        : # 用户名
  xing             : # 用户名
  youtube          : # 用户名
  zhihu            : # 用户名
  csdn             : https://blog.csdn.net/weixin_63310665
  bilibili         : https://space.bilibili.com/1647293091

# 出版物分类及对应标题
publication_category:
  books:
    title: '图书'
  manuscripts:
    title: '期刊论文'
  conferences:
    title: '会议论文'

# 站点功能设置
teaser                   :  # 社交预览默认缩略图文件名（放在 /images/）
breadcrumbs              : false # 是否显示面包屑导航：true 或 false（默认）
words_per_minute         : 160
future                   : true
read_more                : "disabled" # 启用后会在摘要下显示“Read more”链接
talkmap_link             : false      # 设为 true 后，在演讲页显示 talkmap 链接
comments:
  provider               : # false（默认）或 "disqus"、"discourse"、"facebook"、"google-plus"、"staticman"、"custom"
  disqus:
    shortname            :
  discourse:
    server               : # 参考文档：https://meta.discourse.org/t/embedding-discourse-comments-via-javascript/31963（例：meta.discourse.org）
  facebook:
    appid                :
    num_posts            : # 评论条数，默认 5
    colorscheme          : # "light"（默认）或 "dark"
staticman:
  allowedFields          : ['name', 'email', 'url', 'message']
  branch                 : "gh-pages" # 可选 "master" 或 "gh-pages"
  commitMessage          : "New comment."
  filename               : comment-{@timestamp}
  format                 : "yml"
  moderation             : true
  path                   : "_data/comments/{options.slug}"
  requiredFields         : ['name', 'email', 'message']
  transforms:
    email                : "md5"
  generatedFields:
    date:
      type               : "date"
      options:
        format           : "iso8601" # 可选 "iso8601"（默认）、"timestamp-seconds"、"timestamp-milliseconds"
atom_feed:
  hide                   : false     # 设为 true 可隐藏页脚 RSS
  path                   : # 留空（默认）时使用 feed.xml


# SEO 相关
google_site_verification :
bing_site_verification   :
alexa_site_verification  :
yandex_site_verification :


# 社交分享
twitter:
  username               : &twitter
facebook:
  username               :
  app_id                 :
  publisher              :
og_image                 :  # 社交媒体默认分享图片
og_description           : "Daxiang Liu 的学术主页：CAD / 3D 智能、Text-to-CAD 跨模态检索与医学图像分析。"
# 用于声明社交账号（结构化数据）
# - https://developers.google.com/structured-data/customize/social-profiles
social:
  type                   : Person
  name                   : "Daxiang Liu"
  links:
    - https://github.com/daxiangliu


# 统计分析
analytics:
  provider               :  "false" # false（默认）或 "google"、"google-universal"、"google-analytics-4"、"custom"
  google:
    tracking_id          :


# 文件读取配置
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - markdown_generator
  - node_modules
  - package.json*
  - Rakefile
  - README
  - talkmap
  - talkmap.py
  - talkmap.ipynb
  - talkmap_out.ipynb
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"


# 内容转换
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false


# Markdown 处理
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false


# 这里配置模板使用的内容集合类型
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  travel:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/


# 这里配置页面与集合的默认渲染规则
defaults:
  # 文章（_posts）
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # 页面（_pages）
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  # 教学（_teaching）
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  # 出版物（_publications）
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  # 项目集（_portfolio）
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
      comment: true
  # 旅行（_travel）
  - scope:
      path: ""
      type: travel
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  # 演讲（_talks）
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true


# Sass/SCSS 配置
sass:
  sass_dir: _sass
  style: compressed # 输出样式文档：https://sass-lang.com/documentation/file.SASS_REFERENCE.html#output_style


# 输出路径与分页
permalink: /:categories/:title/
# paginate: 5 # 每页显示文章数量
# paginate_path: /page:num/
timezone: Asia/Shanghai # 时区列表：https://en.wikipedia.org/wiki/List_of_tz_database_time_zones


# 插件
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# 在 --safe 模式下模拟 GitHub Pages 插件白名单
whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji


# 归档页设置
#  类型
#  - 兼容 GitHub Pages 的 Liquid 方式：type: liquid（默认）
#  - 使用 Jekyll Archives 插件：type: jekyll-archives
#  路径示例
#  - 使用 Liquid 方式时，对应路径页面需存在，否则可能出现坏链
#    （尤其在启用面包屑时）
#  - <base_path>/tags/my-awesome-tag/index.html ~> path: /tags/
#  - <base_path/categories/my-awesome-category/index.html ~> path: /categories/
#  - <base_path/my-awesome-category/index.html ~> path: /
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
# https://github.com/jekyll/jekyll-archives
# jekyll-archives:
#   enabled:
#     - categories
#     - tags
#   layouts:
#     category: archive-taxonomy
#     tag: archive-taxonomy
#   permalinks:
#     category: /categories/:name/
#     tag: /tags/:name/


# HTML 压缩
# - https://jch.penibelst.de/
compress_html:
  clippings: all
  ignore:
    envs: development
